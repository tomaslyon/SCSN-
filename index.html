<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding:12px;padding-bottom:30px}
button{cursor:pointer;font-family:inherit}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.flex{display:flex;gap:6px;flex-wrap:wrap}
.card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:12px}
.tag{padding:5px 9px;border-radius:7px;font-size:11px;font-weight:600;background:#1e293b;color:#94a3b8;border:1px solid #334155}
.check-row{display:flex;align-items:flex-start;gap:8px;padding:6px 4px;border-radius:7px;cursor:pointer;margin-bottom:1px}
.check-box{width:18px;height:18px;min-width:18px;border-radius:4px;border:2px solid #475569;background:transparent;display:flex;align-items:center;justify-content:center;margin-top:1px;flex-shrink:0}
.check-box.done{border-color:#22c55e;background:#22c55e}
.check-text{font-size:12px;color:#cbd5e1;line-height:1.5}
.check-text.done{color:#4ade80;text-decoration:line-through}
.check-text.warn{color:#fcd34d}
.progress{height:3px;background:#334155;border-radius:99px;margin-bottom:10px}
.progress-bar{height:3px;border-radius:99px;transition:width 0.3s}
.section-sep{color:#475569;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin:8px 0 4px;border-top:1px solid #334155;padding-top:6px}
.entry-badge{background:#0c1f2e;border-radius:8px;padding:7px 10px;margin-bottom:10px}
.rnp-badge{background:#0c2233;border:1px solid #06b6d444;border-radius:8px;padding:8px 10px;margin-bottom:10px;font-size:12px;color:#67e8f9;font-weight:600}
.circ-banner{background:#451a03;border:1px solid #f59e0b88;border-radius:8px;padding:6px 10px;margin-bottom:10px;font-size:12px;color:#fcd34d;font-weight:700;text-align:center}
.timer-big{font-size:40px;font-weight:900;font-family:monospace;text-align:center;color:#475569}
.hint{text-align:center;color:#334155;margin-top:40px;font-size:13px}
</style>
</head>

  <div style="font-size:11px;color:#64748b">T206H · G1000 · Santo Domingo · DGAC Oficial</div>

<div class="grid3" id="apprBtns" style="margin-bottom:12px"></div>
<div class="grid2" id="mdaBanner" style="margin-bottom:10px;display:none"></div>
<div class="flex" id="phaseBtns" style="margin-bottom:10px"></div>
<div id="mainContent"></div>

<div class="card" id="timerCard" style="display:none">

    <div id="timerProgress" style="height:4px;background:#334155;border-radius:99px;margin:6px 0;display:none">

    </div>

  <div style="display:flex;gap:8px">
    <button id="timerToggle" onclick="toggleTimer()" style="flex:1;padding:8px;border-radius:8px;border:none;background:#14532d;color:#86efac;font-weight:700;font-size:13px">▶ Iniciar</button>
    <button onclick="resetTimer()" style="flex:1;padding:8px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#94a3b8;font-weight:700;font-size:13px">↺ Reset</button>
  </div>
</div>

<div class="hint" id="hint">Selecciona una aproximación para comenzar</div>

    {id:"llegada",label:"📡 Llegada",steps:["G1000: Cargar RNP RWY 05 → activar → IAF: UTLOR o ASBIB","COM: Torre Santo Domingo 134.6 / 121.9","BARO actualizado · ALT MNM DODMO: 1.600' · Espera: 3.000'","Velocidad: 100 kt · Flap: 10°","⚠️ APR en AP al entrar tramo final"]},
    {id:"hldg",label:"🔄 Holding ASBIB",isHolding:true,holdingId:"rnp05"},
    {id:"briefing",label:"📋 Briefing",steps:["Tipo: RNP RWY 05 (LNAV only) — Solo instrucción","IAF: UTLOR · IF/IAF: ASBIB · FAF: DODMO · MAPt: RW05","Curso: 054° · LNAV MDA directa: 760' (514')","MDA circular Cat A RWY 23: 800' (554') · CEIL 1.150 ft","Descenso 3.15° · FPM 100 kt = 557 fpm","Frustrada: TR054° hasta 1.000' → viraje izq a 3.000' directo ASBIB → HLDG 054° LT"]},
    {id:"aprox",label:"✈️ Aproximación",steps:["UTLOR → ASBIB (3.000') → DODMO (FAF, 1.600')","DODMO: APR en AP","Flap: 2 nochs · Vel: 90 kt · FPM = 557","A 20 ft sobre MDA: ALT en AP · volar hasta MAPt RW05"]},
    {id:"circular",label:"🔄 Circular → 23",isCircular:true,circRwy:"23",steps:circS("23")},
    {id:"missed",label:"🔺 Frustrada",steps:["Potencia: FULL · GO AROUND","TR054° hasta 1.000' → viraje izq a 3.000' directo ASBIB","HLDG 054° LT o VFR/ATC"]},
    {id:"errores",label:"⚠️ Errores",steps:["✅ APR en AP (obligatorio RNP)","✅ Circular: MDA 800' ≠ directa 760'","✅ 30 seg → CRS 234° inmediatamente"]}
  ]}
};
const FL_LABEL={rnp23:"RNP 23",ils23:"ILS 23",vory05:"VOR Y 05",vorz05:"VOR Z 05",vor23:"VOR 23",rnp05:"RNP 05"};

let selA=null,selP=null,chk={},hFrom=null,elapsed=0,running=false,tgt=null,tInt=null;

function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function startTimer(s){resetTimer();tgt=s;running=true;tInt=setInterval(tick,1000);updateTimer()}
function toggleTimer(){running=!running;if(running)tInt=setInterval(tick,1000);else clearInterval(tInt);updateTimer()}
function resetTimer(){clearInterval(tInt);elapsed=0;running=false;tgt=null;updateTimer()}
function tick(){elapsed++;if(tgt&&elapsed>=tgt){clearInterval(tInt);running=false}updateTimer()}
function updateTimer(){
  const alarm=tgt&&elapsed>=tgt;
  const d=document.getElementById('timerDisplay');
  d.textContent=fmt(elapsed);
  d.style.color=alarm?'#ef4444':running?'#38bdf8':elapsed>0?'#fbbf24':'#475569';
  const p=document.getElementById('timerProgress');
  p.style.display=tgt?'block':'none';
  const b=document.getElementById('timerBar');
  b.style.width=tgt?Math.min(elapsed/tgt*100,100)+'%':'0%';
  b.style.background=alarm?'#ef4444':'#38bdf8';
  document.getElementById('timerAlarm').style.display=alarm?'block':'none';
  document.getElementById('timerCard').style.borderColor=alarm?'#ef4444':'#334155';
  const tb=document.getElementById('timerToggle');
  tb.textContent=running?'⏸ Pausar':'▶ Iniciar';
  tb.style.background=running?'#7f1d1d':'#14532d';
  tb.style.color=running?'#fca5a5':'#86efac';
}

function render(){
  // Appr buttons
  document.getElementById('apprBtns').innerHTML=APPROACHES.map(a=>`<button onclick="selAppr('${a.id}')" style="padding:8px 4px;border-radius:9px;border:2px solid ${selA===a.id?a.color:'#334155'};background:${selA===a.id?a.color+'22':'#1e293b'};color:${selA===a.id?a.color:'#94a3b8'};font-weight:700;font-size:12px;line-height:1.3"><div>${a.label}</div><div style="font-size:10px;font-weight:400;opacity:0.7">${a.sub}</div></button>`).join('');
  // MDA banner
  const mb=document.getElementById('mdaBanner');
  if(selA){
    const m=META[selA],a=FL[selA];
    mb.style.display='grid';
    mb.innerHTML=`<div class="card" style="margin-bottom:0;padding:7px 10px;font-size:11px;border:1px solid ${a.color}44;text-align:center"><div style="color:#64748b;font-size:10px;margin-bottom:2px">↓ DIRECTA RWY ${m.dRwy} (${m.mdaL})</div><div style="color:#f87171;font-weight:800;font-size:15px">${m.mda}</div></div><div class="card" style="margin-bottom:0;padding:7px 10px;font-size:11px;border:1px solid #f59e0b44;text-align:center"><div style="color:#64748b;font-size:10px;margin-bottom:2px">🔄 CIRCULAR RWY ${m.cRwy} (Cat A)</div><div style="color:#fbbf24;font-weight:800;font-size:15px">${m.circ}</div></div>`;
  } else mb.style.display='none';
  // Phase buttons
  const pb=document.getElementById('phaseBtns');
  if(selA){
    const a=FL[selA];
    pb.innerHTML=a.phases.map(p=>{
      const done=!p.isHolding&&p.steps&&p.steps.filter((_,i)=>chk[`${p.id}-${i}`]).length===p.steps.length;
      const ac=p.isHolding?'#06b6d4':p.isCircular?'#f59e0b':a.color;
      return`<button class="tag" onclick="selPhase('${p.id}')" style="border-color:${selP===p.id?ac:done?'#22c55e':'#334155'};background:${selP===p.id?ac+'22':done?'#14532d44':'#1e293b'};color:${selP===p.id?ac:done?'#22c55e':'#94a3b8'}">${done?'✓ ':''}${p.label}</button>`;
    }).join('');
  } else pb.innerHTML='';
  // Main content
  renderMain();
  document.getElementById('timerCard').style.display=selA?'block':'none';
  document.getElementById('hint').style.display=selA?'none':'block';
}

function renderMain(){
  const el=document.getElementById('mainContent');
  if(!selA||!selP){el.innerHTML='';return}
  const a=FL[selA],p=a.phases.find(x=>x.id===selP);
  if(!p){el.innerHTML='';return}
  if(p.isHolding){el.innerHTML=renderHolding(p);return}
  const cN=p.steps.filter((_,i)=>chk[`${p.id}-${i}`]).length,tot=p.steps.length;
  const ac=p.isCircular?'#f59e0b':a.color;
  el.innerHTML=`<div class="card" style="border:1px solid ${p.isCircular?'#f59e0b66':a.color+'44'}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-weight:700;color:${ac};font-size:13px">${p.label}</div>
      <div style="display:flex;gap:6px;align-items:center"><span style="font-size:11px;color:#64748b">${cN}/${tot}</span><button onclick="resetPhase()" style="background:#334155;border:none;border-radius:5px;color:#94a3b8;padding:2px 7px;font-size:10px">Reset</button></div>
    </div>
    ${p.isCircular?`<div class="circ-banner">🔄 CIRCULAR Cat A · MDA = 800' (554') · RWY ${p.circRwy}</div>`:''}
    <div class="progress"><div class="progress-bar" style="background:${ac};width:${(cN/tot)*100}%"></div></div>
    ${p.steps.map((s,i)=>{
      const k=`${p.id}-${i}`,done=chk[k],isW=s.startsWith('⚠️')||s.startsWith('✅');
      return`<div class="check-row" onclick="tog('${k}')" style="background:${done?'#0f2a1a':'transparent'}"><div class="check-box ${done?'done':''}">${done?'<span style="color:#0f2a1a;font-size:11px;font-weight:900">✓</span>':''}</div><span class="check-text ${done?'done':isW?'warn':''}">${s}</span></div>`;
    }).join('')}
  </div>`;
}

function renderHolding(p){
  const h=HLDG[p.holdingId];if(!h)return'';
  if(h.rnp){
    const steps=rnpHS(h.fix,h.hldg,h.turn);
    return`<div class="card" style="border:1px solid #06b6d444">
      <div style="color:#06b6d4;font-weight:700;font-size:13px;margin-bottom:4px">🔄 Holding ${h.fix} — ${h.hldg} ${h.turn}</div>
      <div style="color:#64748b;font-size:11px;margin-bottom:10px">${h.nav}</div>
      <div class="rnp-badge">Procedimiento G1000: HDG → OBS → 5 seg → virar</div>
      ${steps.map((s,i)=>{const k=`hldg-${i}`,done=chk[k];return`<div class="check-row" onclick="tog('${k}')" style="background:${done?'#0f2a1a':'transparent'}"><div class="check-box ${done?'done':''}">${done?'<span style="color:#0f2a1a;font-size:11px;font-weight:900">✓</span>':''}</div><span class="check-text ${done?'done':''}">${s}</span></div>`;}).join('')}
    </div>`;
  }
  const fromBtns=Object.entries(h.desde).map(([id,d])=>`<button onclick="selFrom('${id}')" style="padding:5px 10px;border-radius:7px;font-size:11px;font-weight:600;border:1px solid ${hFrom===id?d.color:'#334155'};background:${hFrom===id?d.color+'22':'#0f172a'};color:${hFrom===id?d.color:'#64748b'}">${FL_LABEL[id]}</button>`).join('');
  let entry='<div style="color:#334155;font-size:12px;text-align:center;padding:10px 0">Selecciona la aproximación anterior</div>';
  if(hFrom&&h.desde[hFrom]){
    const fd=h.desde[hFrom];
    entry=`<div class="entry-badge" style="border:1px solid ${fd.color}66"><span style="color:#64748b;font-size:11px">Entrada: </span><span style="color:${fd.color};font-weight:800;font-size:14px">${fd.tipo}</span></div>
    ${fd.steps.map((s,i)=>{
      const isS=s.startsWith('→'),k=`hldg-${hFrom}-${i}`,done=chk[k];
      if(isS)return`<div style="background:#1e3a5f;border-radius:6px;padding:4px 8px;color:${fd.color};font-weight:700;font-size:12px;margin-bottom:1px">${s}</div>`;
      return`<div class="check-row" onclick="tog('${k}')" style="background:${done?'#0f2a1a':'transparent'}"><div class="check-box ${done?'done':''}">${done?'<span style="color:#0f2a1a;font-size:11px;font-weight:900">✓</span>':''}</div><span class="check-text ${done?'done':''}">${s}</span></div>`;
    }).join('')}`;
  }
  return`<div class="card" style="border:1px solid #06b6d444">
    <div style="color:#06b6d4;font-weight:700;font-size:13px;margin-bottom:4px">🔄 Holding ${h.fix} — ${h.hldg} ${h.turn}</div>
    <div style="color:#64748b;font-size:11px;margin-bottom:10px">${h.nav}</div>
    <div style="color:#94a3b8;font-size:11px;margin-bottom:8px">¿De dónde vienes?</div>
    <div class="flex" style="margin-bottom:10px">${fromBtns}</div>
    ${entry}
  </div>`;
}

function selAppr(id){selA=id;selP=null;chk={};hFrom=null;resetTimer();render()}
function selPhase(id){selP=id;chk={};hFrom=null;render()}
function resetPhase(){chk={};render()}
function tog(k){chk[k]=!chk[k];render()}
function selFrom(id){hFrom=hFrom===id?null:id;render()}

render();
</script>
</body>
</html>
